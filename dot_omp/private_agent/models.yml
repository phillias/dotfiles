# ─────────────────────────────────────────────────
# oh-my-pi (omp) — Provider Configuration
# OpenCode Go (subscription) + OpenCode Zen (pay-as-you-go)
# ─────────────────────────────────────────────────

providers:
  # ── OpenCode Go — $10/mo subscription ──
  # Models: GLM, Kimi, DeepSeek, MiMo (OpenAI-compatible)
  #         MiniMax, Qwen (Anthropic-compatible)
  opencode-go:
    baseUrl: https://opencode.ai/zen/go/v1
    apiKey: OPENCODE_API_KEY
    api: openai-completions
    models:
      # OpenAI-compatible (chat/completions)
      - id: glm-5.2
        name: GLM 5.2
        contextWindow: 131072
      - id: glm-5.1
        name: GLM 5.1
        contextWindow: 131072
      - id: kimi-k2.7-code
        name: Kimi K2.7 Code
        contextWindow: 131072
      - id: kimi-k2.6
        name: Kimi K2.6
        contextWindow: 131072
      - id: deepseek-v4-pro
        name: DeepSeek V4 Pro
        contextWindow: 131072
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash
        contextWindow: 131072
      - id: mimo-v2.5
        name: MiMo V2.5
        contextWindow: 131072
      - id: mimo-v2.5-pro
        name: MiMo V2.5 Pro
        contextWindow: 131072

      # Anthropic-compatible (messages) — override api per model
      - id: minimax-m3
        name: MiniMax M3
        api: anthropic-messages
        contextWindow: 131072
      - id: minimax-m2.7
        name: MiniMax M2.7
        api: anthropic-messages
        contextWindow: 131072
      - id: minimax-m2.5
        name: MiniMax M2.5
        api: anthropic-messages
        contextWindow: 131072
      - id: qwen3.7-max
        name: Qwen 3.7 Max
        api: anthropic-messages
        contextWindow: 131072
      - id: qwen3.7-plus
        name: Qwen 3.7 Plus
        api: anthropic-messages
        contextWindow: 131072
      - id: qwen3.6-plus
        name: Qwen 3.6 Plus
        api: anthropic-messages
        contextWindow: 131072

  # ── OpenCode Zen — Pay-as-you-go ──
  # Premium models: GPT-5.x, Claude, Gemini, plus all Go models
  opencode-zen:
    baseUrl: https://opencode.ai/zen/v1
    apiKey: OPENCODE_API_KEY

    # Per-model api overrides handle the multi-protocol gateway

    # ── OpenAI Responses API models (gpt-5.x) ──
    models:
      - id: gpt-5.5
        name: GPT 5.5
        api: openai-responses
        contextWindow: 131072
      - id: gpt-5.5-pro
        name: GPT 5.5 Pro
        api: openai-responses
        contextWindow: 131072
      - id: gpt-5.4
        name: GPT 5.4
        api: openai-responses
        contextWindow: 131072
      - id: gpt-5.4-pro
        name: GPT 5.4 Pro
        api: openai-responses
        contextWindow: 131072
      - id: gpt-5.4-mini
        name: GPT 5.4 Mini
        api: openai-responses
        contextWindow: 131072
      - id: gpt-5.3-codex
        name: GPT 5.3 Codex
        api: openai-responses
        contextWindow: 131072

      # ── Anthropic Messages API models ──
      - id: claude-opus-4-8
        name: Claude Opus 4.8
        api: anthropic-messages
        contextWindow: 200000
      - id: claude-sonnet-4-7
        name: Claude Sonnet 4.7
        api: anthropic-messages
        contextWindow: 200000

      # ── Google Generative AI models ──
      - id: gemini-3.5-flash
        name: Gemini 3.5 Flash
        api: google-generative-ai
        contextWindow: 1048576
      - id: gemini-3.1-pro
        name: Gemini 3.1 Pro
        api: google-generative-ai
        contextWindow: 1048576

      # ── OpenAI-compatible (DeepSeek, Kimi, GLM — same as Go) ──
      - id: deepseek-v4-pro
        api: openai-completions
      - id: kimi-k2.6
        api: openai-completions
      - id: glm-5.1
        api: openai-completions

# ── Default model selection ──
# The agent will use this model by default
models:
  default:
    provider: opencode-go
    model: kimi-k2.6
