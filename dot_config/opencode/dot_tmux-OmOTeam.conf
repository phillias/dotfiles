# ── OmO Team Mode tmux config ─────────────────────────────────
# Sources your base ~/.tmux.conf then layers OmO team-mode overrides.
# Used automatically by: oc team
#
# To use standalone:
#   tmux -f ~/.config/opencode/.tmux-OmOTeam.conf attach

source-file ~/.tmux.conf

# ── OmO Team Mode overrides ───────────────────────────────────

set -g status-left "#[fg=green]OmO Team #[default]"
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M #[default]"

set -g pane-border-status top
set -g pane-border-format "#[fg=cyan]#{pane_index} #{pane_title}"
set -g pane-active-border-style "fg=green,bg=default"

set -g history-limit 50000
set -g remain-on-exit on
set -g detach-on-destroy off

set -g display-panes-time 4000
set -g display-time 4000
