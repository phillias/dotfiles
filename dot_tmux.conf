# =============================================================================
# tmux.conf — replacing GNU Screen (~/.screenrc)
#   - Solarized dark palette
#   - ALL keybindings gated behind Ctrl+A (zero prefixless binds)
#   - Vi-style navigation: h/j/k/l for panes, n/p/c for windows
#   - Window title: user@host:/path in terminal tab
#   - Logging: ~/tmuxscreenlogs/YYYYMMDD.WINDOW.log
#   - Vi copy mode with pbcopy
# Reload: tmux source-file ~/.tmux.conf
# =============================================================================

# ---------------------------------------------------------------------------
# GENERAL SETTINGS
# ---------------------------------------------------------------------------

set -g default-shell /bin/zsh
set -g history-limit 9999
set -g display-time 3000
# quiet option removed — not supported in tmux 3.x
set -g escape-time 10
set -g base-index 1

# Prefix: Ctrl+a (left-pinky on Ctrl, left ring on a — home row, single hand, byte 0x01 clean)
unbind C-b
unbind C-[
unbind C-]
set -g prefix C-a
bind C-a last-window          # double-tap prefix = swap last window
bind C-o send-prefix           # Ctrl+o sends literal prefix through

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"
set -ga terminal-overrides "*:Ms=\E]52;%p1%s;%p2%s\a"
set -g set-clipboard on
set -g allow-passthrough on    # required for reliable OSC 52 in Ghostty/iTerm2
set -g extended-keys on
set -g mouse on

# ---------------------------------------------------------------------------
# WINDOW / PANE TITLE (user@host:/path in terminal tab)
# ---------------------------------------------------------------------------

set -g set-titles on
set -g set-titles-string "#{user}@#{host}:#{pane_current_path}"
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# ---------------------------------------------------------------------------
# SOLARIZED DARK PALETTE
# ---------------------------------------------------------------------------
# base03=#002b36   base02=#073642   base01=#586e75   base00=#657b83
# base0=#839496    base1=#93a1a1    base2=#eee8d5    base3=#fdf6e3
# yellow=#b58900   orange=#cb4b16  red=#dc322f      magenta=#d33682
# violet=#6c71c4   blue=#268bd2    cyan=#2aa198      green=#859900
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# STATUS BAR (Solarized Dark)
# ---------------------------------------------------------------------------

set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style "bg=#002b36,fg=#657b83"

set -g status-left-length 40
set -g status-right-length 60

# Left: session name on blue
set -g status-left "#[bg=#268bd2,fg=#eee8d5] #S #[default]"

# Normal window tab
setw -g window-status-format "#[bg=#002b36,fg=#586e75] #I:#W "
# Current window tab — solarized green on lighter dark bg
setw -g window-status-current-format "#[bg=#073642,fg=#859900,bold] #I:#W "
setw -g window-status-separator ""
# Bell — red
setw -g window-status-bell-style "fg=#eee8d5,bg=#dc322f"

# Right: hostname | date/time on cyan
set -g status-right "#[bg=#2aa198,fg=#002b36] #{user}@#{host}:#{pane_current_path} #[default]"

# Activity monitoring (matches screenrc bell monitoring)
setw -g monitor-activity on
set -g visual-activity on

# ---------------------------------------------------------------------------
# KEYBINDINGS
# ---------------------------------------------------------------------------

# --- Windows (Ctrl still held after prefix) ---
bind C-n next-window
bind C-p previous-window
bind C-e new-window            # Ctrl+e = new window (e = n**e**w)
# C-c is reserved for cancel in tmux, so new window is Ctrl+e

# --- Pane navigation (Ctrl still held after prefix) ---
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# --- Pane splits (release Ctrl for these) ---
bind | split-window -h
bind - split-window -v

# --- Close pane ---
bind C-x kill-pane

# --- Copy mode (vi keys) ---
bind Enter copy-mode
setw -g mode-keys vi

bind -T copy-mode-vi C-c send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste buffer (release Ctrl, press ]) — default tmux binding

# --- Search (release Ctrl for /) ---
bind / copy-mode \; send-keys /

# --- Detach (Ctrl still held) ---
bind C-d detach-client

# --- Rename (Ctrl still held) ---
bind C-r command-prompt "rename-session '%%'"
# Rename window: release Ctrl for comma
bind , command-prompt "rename-window '%%'"

# ---------------------------------------------------------------------------
# LOGGING (matches screenrc: deflog on + logfile screenlog/%Y%m%d.%n.log)
# Toggle per-pane: Prefix + L
# Output: ~/tmuxscreenlogs/YYYYMMDD.WINDOW.log
# ---------------------------------------------------------------------------

bind L run "tmux pipe-pane -o 'cat >> ~/tmuxscreenlogs/\$(date +%Y%m%d).#{window_index}.log'; tmux display-message 'Log #{?pane_in_mode,off,on}'"

# ---------------------------------------------------------------------------
# PANE BORDERS (solarized)
# ---------------------------------------------------------------------------

set -g pane-active-border-style "fg=#268bd2"
set -g pane-border-style "fg=#073642"

# ---------------------------------------------------------------------------
# MESSAGES (solarized)
# ---------------------------------------------------------------------------

set -g message-style "fg=#93a1a1,bg=#073642"
set -g message-command-style "fg=#93a1a1,bg=#073642"

# ---------------------------------------------------------------------------
# COPY MODE STYLES (solarized)
# ---------------------------------------------------------------------------

set -g mode-style "fg=#002b36,bg=#93a1a1"

# ---------------------------------------------------------------------------
# QUICK REFERENCE (all commands gated behind Ctrl+A, Ctrl held throughout)
# ---------------------------------------------------------------------------
#  Hold Ctrl, press \, then press the command key (still holding Ctrl)
#
#  Pane navigation (vi keys)
#    h  left       j  down       k  up       l  right
#
#  Window management
#    a  swap to last window (double-tap prefix)   e  new window   n  next   p  previous
#
#  Splits (release Ctrl briefly)
#    |  left/right          -  top/bottom
#
#  Close pane
#    x  kill-pane
#
#  Copy mode & scrollback
#    Enter  enter copy mode   /  enter copy mode + search (release Ctrl)
#    In copy mode:
#      v  begin selection      y  yank to clipboard
#      V  select line          C-v  rectangle toggle
#    ]  paste buffer  (yank, Ctrl still held)
#
#  Logging (release Ctrl)
#    L  toggle pane output to ~/tmuxscreenlogs/YYYYMMDD.WINDOW.log
#
#  Other
#    d  detach                r  rename session
#    ,  rename window
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# OPTIONAL STARTUP SESSION
# ---------------------------------------------------------------------------
# Uncomment to auto-start with a named session:
# new-session -s main
